<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Shabbos Mode Setup</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: linear-gradient(135deg, #0f172a, #1e293b);
        color: white;
      }
      .card {
        width: min(92vw, 460px);
        padding: 24px;
        border-radius: 20px;
        background: rgba(255,255,255,0.12);
        backdrop-filter: blur(16px);
        box-shadow: 0 12px 40px rgba(0,0,0,0.25);
      }
      h1 { font-size: 1.4rem; margin: 0 0 8px; }
      p { line-height: 1.5; color: #e2e8f0; }
      .pill {
        display: inline-block;
        margin-top: 8px;
        padding: 6px 10px;
        border-radius: 999px;
        background: rgba(255,255,255,0.14);
        font-size: 0.9rem;
      }
      .status {
        margin-top: 14px;
        padding: 12px;
        border-radius: 12px;
        background: rgba(255,255,255,0.08);
        font-size: 0.95rem;
      }
      .hidden { display: none; }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Shabbos Mode Setup</h1>
      <p>This page is ready to receive a setup payload from the iPad QR code.</p>
      <div class="pill" id="deviceIdPill">Device: waiting…</div>
      <div class="status" id="statusBox">Opening your setup…</div>
    </div>

    <script>
      const params = new URLSearchParams(window.location.search);
      const payload = params.get('payload');
      const deviceId = params.get('deviceId');

      const devicePill = document.getElementById('deviceIdPill');
      const statusBox = document.getElementById('statusBox');

      if (deviceId) {
        devicePill.textContent = `Device: ${deviceId}`;
      }

      if (payload) {
        statusBox.textContent = 'Setup payload received. The device can use this page as the handoff point.';
      } else {
        statusBox.textContent = 'No setup payload was found in the link.';
      }
    </script>
  </body>
</html>
