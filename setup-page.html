<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Shabbos Mode Setup</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: linear-gradient(135deg, #0f172a, #1e293b);
        color: white;
      }
      .card {
        width: min(92vw, 460px);
        padding: 24px;
        border-radius: 20px;
        background: rgba(255,255,255,0.12);
        backdrop-filter: blur(16px);
        box-shadow: 0 12px 40px rgba(0,0,0,0.25);
      }
      h1 { font-size: 1.4rem; margin: 0 0 8px; }
      p { line-height: 1.5; color: #e2e8f0; }
      .pill {
        display: inline-block;
        margin-top: 8px;
        padding: 6px 10px;
        border-radius: 999px;
        background: rgba(255,255,255,0.14);
        font-size: 0.9rem;
      }
      .status {
        margin-top: 14px;
        padding: 12px;
        border-radius: 12px;
        background: rgba(255,255,255,0.08);
        font-size: 0.95rem;
      }
      .payloadBox {
        margin-top: 12px;
        padding: 12px;
        border-radius: 12px;
        background: rgba(0,0,0,0.24);
        font-size: 0.85rem;
        line-height: 1.35;
        word-break: break-all;
        white-space: pre-wrap;
      }
      .payloadActions {
        margin-top: 18px;
        display: grid;
        gap: 12px;
      }
      .actionLink {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 12px 16px;
        border-radius: 14px;
        background: #2563eb;
        color: white;
        text-decoration: none;
        font-weight: 600;
      }
      .qrHolder {
        width: 180px;
        height: 180px;
        margin: 0 auto;
        padding: 12px;
        background: white;
        border-radius: 20px;
      }
      .hidden { display: none; }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Shabbos Mode Setup</h1>
      <p>This page is ready to receive a setup payload from the iPad QR code.</p>
      <div class="pill" id="deviceIdPill">Device: waiting…</div>
      <div class="status" id="statusBox">Opening your setup…</div>
      <div class="payloadBox hidden" id="payloadBox">No payload received yet.</div>
      <div class="payloadActions hidden" id="payloadActions">
        <div class="qrHolder" id="deepLinkQR"></div>
        <a id="deepLinkButton" class="actionLink" href="#">Open setup in iPad app</a>
      </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script>
      const params = new URLSearchParams(window.location.search);
      const payload = params.get('payload');
      const deviceId = params.get('deviceId');

      const devicePill = document.getElementById('deviceIdPill');
      const statusBox = document.getElementById('statusBox');
      const payloadBox = document.getElementById('payloadBox');
      const payloadActions = document.getElementById('payloadActions');
      const deepLinkButton = document.getElementById('deepLinkButton');

      if (deviceId) {
        devicePill.textContent = `Device: ${deviceId}`;
      }

      if (payload) {
        let parsedPayload;
        try {
          parsedPayload = JSON.parse(decodeURIComponent(payload));
        } catch (error) {
          statusBox.textContent = 'Invalid payload format.';
          payloadBox.textContent = payload;
          payloadBox.classList.remove('hidden');
          return;
        }

        statusBox.textContent = 'Setup payload received. Scan the iPad QR or open the link below.';
        devicePill.textContent = `Device: ${parsedPayload.deviceId || 'unknown'}`;
        payloadBox.textContent = `Selected teams:\n${parsedPayload.teamIds.join(', ')}\n\nDevice ID:\n${parsedPayload.deviceId || 'unknown'}`;
        payloadBox.classList.remove('hidden');

        const handoffUrl = `https://adambrress.github.io/Adambrress/setup-page.html?payload=${encodeURIComponent(JSON.stringify(parsedPayload))}`;
        new QRCode(document.getElementById('deepLinkQR'), {
          text: handoffUrl,
          width: 180,
          height: 180,
          colorDark: '#111827',
          colorLight: '#f8fafc',
          correctLevel: QRCode.CorrectLevel.H,
        });
        deepLinkButton.href = handoffUrl;
        deepLinkButton.textContent = 'Open setup on iPad browser';
        document.getElementById('payloadActions').classList.remove('hidden');
      } else {
        statusBox.textContent = 'No setup payload was found in the link.';
        payloadBox.textContent = 'No payload received yet.';
        payloadBox.classList.remove('hidden');
      }
    </script>
  </body>
</html>
